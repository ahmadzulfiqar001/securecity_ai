name: securecity_dashboard
description: SecureCity AI — Authority Dashboard (Police, Fire, Ambulance, Traffic, Admin)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State Management & Navigation
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0

  # Charts
  fl_chart: ^0.68.0

  # cv_engine HTTP + live detection feed (the dashboard's first calls to a
  # Python microservice rather than Firestore — see ComputerVisionScreen)
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # GIS module — OpenStreetMap via flutter_map (mobile keeps Google Maps;
  # no billing/API key needed for this internal admin tool)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Fonts & Internationalization
  google_fonts: ^6.2.0
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

  # Entrance/transition animations — same package and vocabulary as
  # mobile/pubspec.yaml, so both apps share one animation language.
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Test-only Firebase fakes — same packages proven in mobile/pubspec.yaml
  firebase_auth_mocks: ^0.14.0
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true
