name: securecity_ai
description: SecureCity AI - Intelligent Urban Safety Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  # Bumped from the 3.x/5.x/12.x generation to the 4.x/6.x/13.x generation
  # as a set (Firebase Flutter plugins must stay on the same generation to
  # interoperate) - required by firebase_app_check below, which only
  # supports firebase_core >=4.12.1.
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  firebase_messaging: ^16.4.3
  firebase_analytics: ^12.4.5
  firebase_crashlytics: ^5.2.6
  firebase_remote_config: ^6.5.5
  # Firebase AI Logic (Gemini Developer API backend - no billing account
  # required, unlike the Vertex AI backend) + App Check, which AI Logic
  # requires to authorize calls.
  firebase_ai: ^3.14.1
  firebase_app_check: ^0.4.5+2

  # State Management & Navigation
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0

  # Maps & Location
  # OpenStreetMap-based - no Google billing account / API key needed, unlike
  # google_maps_flutter.
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  geolocator: ^12.0.0

  # Sensors & Hardware
  sensors_plus: ^5.0.0
  local_auth: ^2.2.0
  vibration: ^3.2.0

  # Media & Camera
  image_picker: ^1.1.0
  camera: ^0.11.0
  record: ^7.1.1
  video_player: ^2.8.0

  # Permissions
  permission_handler: ^11.3.0

  # Voice & TTS
  speech_to_text: ^7.4.0
  flutter_tts: ^4.0.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0
  url_launcher: ^6.3.0

  # Storage & Preferences
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Authentication
  google_sign_in: ^6.2.0

  # UI & Animations
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

  # Charts
  fl_chart: ^0.68.0

  # Internationalization
  intl: ^0.19.0

  # Code Generation
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Value equality
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.0

  # Test-only Firebase fakes - widget tests never touch real Firebase
  # plugin channels, so FirebaseAuth/Firestore providers are overridden
  # with these in tests. Bumped alongside firebase_auth/cloud_firestore
  # above - these fakes are version-coupled to the real plugin majors.
  firebase_auth_mocks: ^0.15.2
  fake_cloud_firestore: ^4.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 700
