name: SecureCity AI Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/securecity-ai

# ============================================================
jobs:

  # ──────────────────────────────────────────────────────────
  # Trivy Container Security Scan
  # ──────────────────────────────────────────────────────────
  trivy-container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        service: [ai_engine, cv_engine]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build \
            --target production \
            -t securecity-${{ matrix.service }}:scan \
            backend/${{ matrix.service }}/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securecity-${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Run Trivy in table format (summary)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securecity-${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ──────────────────────────────────────────────────────────
  # Trivy Filesystem / IaC Scan
  # ──────────────────────────────────────────────────────────
  trivy-filesystem-scan:
    name: Trivy Filesystem & IaC Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ──────────────────────────────────────────────────────────
  # Bandit — Python Security Linting
  # ──────────────────────────────────────────────────────────
  bandit-python-scan:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[sarif] bandit-sarif-formatter

      - name: Run Bandit on AI Engine
        run: |
          bandit -r backend/ai_engine/app \
            -f sarif \
            -o bandit-ai-engine.sarif \
            -ll \
            || true

      - name: Run Bandit on CV Engine
        run: |
          bandit -r backend/cv_engine/app \
            -f sarif \
            -o bandit-cv-engine.sarif \
            -ll \
            || true

      - name: Merge Bandit reports
        run: |
          python3 -c "
          import json, glob
          issues = []
          for f in glob.glob('bandit-*.sarif'):
              with open(f) as fh:
                  data = json.load(fh)
                  for run in data.get('runs', []):
                      issues.extend(run.get('results', []))
          print(f'Total Bandit issues: {len(issues)}')
          "

      - name: Upload Bandit AI Engine results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-ai-engine.sarif
          category: bandit-ai-engine

      - name: Run Bandit with text output (CI summary)
        run: |
          echo "### Bandit Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          bandit -r backend/ \
            -ll \
            --exclude backend/*/tests \
            -f text || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────
  # npm audit — Cloud Functions Dependency Vulnerabilities
  # ──────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit (Cloud Functions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Run npm audit
        working-directory: functions
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true
          cat npm-audit.json | jq '.metadata'

      - name: Check for critical vulnerabilities
        working-directory: functions
        run: |
          CRITICAL=$(cat npm-audit.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat npm-audit.json | jq '.metadata.vulnerabilities.high // 0')
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "Critical npm vulnerabilities found!"
            npm audit --audit-level=critical
            exit 1
          fi
          echo "No critical npm vulnerabilities"

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: functions/npm-audit.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # CodeQL — Static Analysis
  # ──────────────────────────────────────────────────────────
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-${{ matrix.language }}

  # ──────────────────────────────────────────────────────────
  # Secret Scanning (gitleaks)
  # ──────────────────────────────────────────────────────────
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ──────────────────────────────────────────────────────────
  # OWASP ZAP API Scan (Weekly Only)
  # ──────────────────────────────────────────────────────────
  owasp-zap-api-scan:
    name: OWASP ZAP API Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test environment
        run: |
          docker compose up -d ai_engine redis
          sleep 60

      - name: Wait for API health
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:8001/health; then
              echo "API is ready"
              break
            fi
            sleep 5
          done

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: http://localhost:8001/openapi.json
          format: openapi
          rules_file_name: .github/zap-rules.conf
          cmd_options: '-a -j -z "-config api.key=securecity-zap-key"'
          fail_action: false

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report-${{ github.run_number }}
          path: report_json.json
          retention-days: 90

      - name: Post ZAP summary to GitHub Issues
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('report_json.json', 'utf8'));
              const alerts = report.site?.[0]?.alerts || [];
              const highs = alerts.filter(a => a.riskcode >= 3);
              if (highs.length > 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[Security] OWASP ZAP found ${highs.length} high-risk issues`,
                  body: `## Weekly ZAP Scan Results\n\n**Run:** ${context.runId}\n\n${highs.map(h => `### ${h.name}\n${h.description}`).join('\n\n')}`,
                  labels: ['security', 'zap-scan']
                });
              }
            } catch (e) {
              console.log('Could not parse ZAP report:', e);
            }

      - name: Teardown test environment
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────────────
  # Dependency Review (PR only)
  # ──────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, PSF-2.0
