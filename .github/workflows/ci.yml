name: SecureCity AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ============================================================
# Mobile-only for now — dashboard/, backend/, and functions/ have been
# set aside. This pipeline covers the Flutter mobile app in mobile/
# only; restore the fuller pipeline from git history if those come back.
# ============================================================
jobs:
  test-flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Generate code (riverpod/freezed/json_serializable)
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Flutter analyze
        working-directory: mobile
        run: flutter analyze --fatal-warnings

      - name: Run Flutter tests
        working-directory: mobile
        run: |
          flutter test \
            --coverage \
            --reporter=expanded

      - name: Build Android APK (verify)
        working-directory: mobile
        run: flutter build apk --release

      - name: Upload Flutter coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: mobile/coverage
          flags: flutter
          name: flutter-coverage
